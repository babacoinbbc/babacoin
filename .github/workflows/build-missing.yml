name: Build Missing Platforms (Ubuntu 20.04 + macOS Intel)
'on':
  push:
    tags:
    - v*-missing
  workflow_dispatch:
jobs:
  build-ubuntu-2004:
    name: Ubuntu (20.04)
    runs-on: ubuntu-20.04
    timeout-minutes: 90
    steps:
    - uses: actions/checkout@v4
    - name: Install dependencies
      run: 'sudo apt-get update

        sudo apt-get install -y build-essential libtool autotools-dev automake pkg-config libssl-dev libevent-dev libboost-all-dev libdb5.3-dev libdb5.3++-dev libminiupnpc-dev libzmq3-dev python3 qtbase5-dev qttools5-dev qttools5-dev-tools libqt5svg5-dev libprotobuf-dev protobuf-compiler libqrencode-dev cmake libgmp-dev git

        '
    - name: Build and install bls-dash
      run: "git clone --depth=1 --branch 1.1.0 https://github.com/dashpay/bls-signatures.git /tmp/bls-src\n# GCC 13+ (Ubuntu 24.04) needs explicit <memory> include for unique_ptr\n# Only apply patch on Linux (macOS clang handles it)\nif [ \"$(uname)\" = \"Linux\" ]; then\n  for f in /tmp/bls-src/src/threshold.cpp /tmp/bls-src/src/threshold.hpp; do\n    if [ -f \"$f\" ]; then\n      ( echo '#include <memory>'; cat \"$f\" ) > \"$f.new\" && mv \"$f.new\" \"$f\"\n    fi\n  done\nfi\nmkdir -p /tmp/bls-src/build && cd /tmp/bls-src/build\ncmake .. -DCMAKE_POSITION_INDEPENDENT_CODE=ON -DCMAKE_C_FLAGS=\"-fPIC\" -DCMAKE_CXX_FLAGS=\"-fPIC\" -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr/local -DCMAKE_POLICY_VERSION_MINIMUM=3.5 -DBUILD_BLS_JS_BINDINGS=0 -DBUILD_BLS_PYTHON_BINDINGS=0 -DBUILD_BLS_TESTS=0 -DBUILD_BLS_BENCHMARKS=0\nmake -j$(nproc)\nLIB=$(find /tmp/bls-src/build -maxdepth 1 -name \"libbls-dash.a\" 2>/dev/null | head -1)\nif [ -z \"$LIB\" ]; then\n  echo \"ERROR: libdashbls.a not\
        \ found after build!\"; find /tmp/bls-src/build -name \"*.a\"; exit 1\nfi\nsudo cp \"$LIB\" /usr/local/lib/libbls-dash.a\nsudo mkdir -p /usr/local/include/bls-dash\nsudo find /tmp/bls-src/src -maxdepth 1 -name \"*.hpp\" -exec cp {} /usr/local/include/bls-dash/ \\;\nsudo find /tmp/bls-src/build/_deps/relic-src/include -name \"*.h\" -exec cp {} /usr/local/include/ \\; 2>/dev/null || true\nsudo find /tmp/bls-src/build/_deps/relic-build/include -name \"*.h\" -exec cp {} /usr/local/include/ \\; 2>/dev/null || true\necho \"Library : $(ls -lh /usr/local/lib/libbls-dash.a)\"\necho \"Headers : $(ls /usr/local/include/bls-dash/)\"\necho \"Relic   : $(ls /usr/local/include/relic_conf.h 2>/dev/null || echo MISSING)\"\n"
    - name: Build Babacoin
      run: './autogen.sh

        ./configure --with-incompatible-bdb BDB_LIBS="-ldb_cxx-5.3" BDB_CFLAGS="-I/usr/include" --disable-tests --disable-bench --with-gui=qt5 --disable-stacktraces --disable-shared CPPFLAGS="-I/usr/local/include" LDFLAGS="-L/usr/local/lib"

        make -j$(nproc)

        '
    - name: Package
      run: 'mkdir -p dist

        strip src/babacoind src/babacoin-cli src/babacoin-tx src/qt/babacoin-qt

        cp src/babacoind src/babacoin-cli src/babacoin-tx src/qt/babacoin-qt dist/

        tar -czf babacoin-v2.0.0-linux-ubuntu20.04-x86_64.tar.gz -C dist .

        '
    - uses: actions/upload-artifact@v4
      with:
        name: babacoin-ubuntu-20.04
        path: babacoin-v2.0.0-linux-ubuntu20.04-x86_64.tar.gz
  build-ubuntu-2004-arm:
    name: Ubuntu 20.04 (ARM64)
    runs-on: ubuntu-20.04-arm
    timeout-minutes: 90
    steps:
    - uses: actions/checkout@v4
    - name: Install dependencies
      run: 'sudo apt-get update

        sudo apt-get install -y build-essential libtool autotools-dev automake pkg-config libssl-dev libevent-dev libboost-all-dev libdb5.3-dev libdb5.3++-dev libminiupnpc-dev libzmq3-dev python3 qtbase5-dev qttools5-dev qttools5-dev-tools libqt5svg5-dev libprotobuf-dev protobuf-compiler libqrencode-dev cmake libgmp-dev git

        '
    - name: Build and install bls-dash
      run: "git clone --depth=1 --branch 1.1.0 https://github.com/dashpay/bls-signatures.git /tmp/bls-src\n# GCC 13+ (Ubuntu 24.04) needs explicit <memory> include for unique_ptr\n# Only apply patch on Linux (macOS clang handles it)\nif [ \"$(uname)\" = \"Linux\" ]; then\n  for f in /tmp/bls-src/src/threshold.cpp /tmp/bls-src/src/threshold.hpp; do\n    if [ -f \"$f\" ]; then\n      ( echo '#include <memory>'; cat \"$f\" ) > \"$f.new\" && mv \"$f.new\" \"$f\"\n    fi\n  done\nfi\nmkdir -p /tmp/bls-src/build && cd /tmp/bls-src/build\ncmake .. -DCMAKE_POSITION_INDEPENDENT_CODE=ON -DCMAKE_C_FLAGS=\"-fPIC\" -DCMAKE_CXX_FLAGS=\"-fPIC\" -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr/local -DCMAKE_POLICY_VERSION_MINIMUM=3.5 -DBUILD_BLS_JS_BINDINGS=0 -DBUILD_BLS_PYTHON_BINDINGS=0 -DBUILD_BLS_TESTS=0 -DBUILD_BLS_BENCHMARKS=0\nmake -j$(nproc)\nLIB=$(find /tmp/bls-src/build -maxdepth 1 -name \"libbls-dash.a\" 2>/dev/null | head -1)\nif [ -z \"$LIB\" ]; then\n  echo \"ERROR: libdashbls.a not\
        \ found after build!\"; find /tmp/bls-src/build -name \"*.a\"; exit 1\nfi\nsudo cp \"$LIB\" /usr/local/lib/libbls-dash.a\nsudo mkdir -p /usr/local/include/bls-dash\nsudo find /tmp/bls-src/src -maxdepth 1 -name \"*.hpp\" -exec cp {} /usr/local/include/bls-dash/ \\;\nsudo find /tmp/bls-src/build/_deps/relic-src/include -name \"*.h\" -exec cp {} /usr/local/include/ \\; 2>/dev/null || true\nsudo find /tmp/bls-src/build/_deps/relic-build/include -name \"*.h\" -exec cp {} /usr/local/include/ \\; 2>/dev/null || true\necho \"Library : $(ls -lh /usr/local/lib/libbls-dash.a)\"\necho \"Headers : $(ls /usr/local/include/bls-dash/)\"\necho \"Relic   : $(ls /usr/local/include/relic_conf.h 2>/dev/null || echo MISSING)\"\n"
    - name: Build Babacoin
      run: './autogen.sh

        ./configure --with-incompatible-bdb BDB_LIBS="-ldb_cxx-5.3" BDB_CFLAGS="-I/usr/include" --disable-tests --disable-bench --with-gui=qt5 --disable-stacktraces --disable-shared CPPFLAGS="-I/usr/local/include" LDFLAGS="-L/usr/local/lib"

        make -j$(nproc)

        '
    - name: Package
      run: 'mkdir -p dist

        strip src/babacoind src/babacoin-cli src/babacoin-tx src/qt/babacoin-qt

        cp src/babacoind src/babacoin-cli src/babacoin-tx src/qt/babacoin-qt dist/

        tar -czf babacoin-v2.0.0-linux-ubuntu20.04-arm64.tar.gz -C dist .

        '
    - uses: actions/upload-artifact@v4
      with:
        name: babacoin-ubuntu-20.04-arm64
        path: babacoin-v2.0.0-linux-ubuntu20.04-arm64.tar.gz
  build-macos-intel:
    name: macOS Intel (x86_64)
    runs-on: macos-12
    timeout-minutes: 90
    steps:
    - uses: actions/checkout@v4
    - name: Install dependencies
      run: "brew update\nfor pkg in autoconf automake libtool pkg-config openssl@3 libevent boost miniupnpc zeromq cmake gmp qt@5 protobuf libqrencode; do\n  brew install \"$pkg\" 2>/dev/null || true\ndone\nbrew install berkeley-db@5 2>/dev/null || brew install berkeley-db 2>/dev/null || true\n"
    - name: Build and install bls-dash
      run: "BREW_PREFIX=$(brew --prefix)\nGMP_PREFIX=$(brew --prefix gmp 2>/dev/null || echo \"$BREW_PREFIX\")\ngit clone --depth=1 --branch 1.1.0 https://github.com/dashpay/bls-signatures.git /tmp/bls-src\n# GCC 13+ (Ubuntu 24.04) needs explicit <memory> include for unique_ptr\n# Only apply patch on Linux (macOS clang handles it)\nif [ \"$(uname)\" = \"Linux\" ]; then\n  for f in /tmp/bls-src/src/threshold.cpp /tmp/bls-src/src/threshold.hpp; do\n    if [ -f \"$f\" ]; then\n      ( echo '#include <memory>'; cat \"$f\" ) > \"$f.new\" && mv \"$f.new\" \"$f\"\n    fi\n  done\nfi\nmkdir -p /tmp/bls-src/build && cd /tmp/bls-src/build\ncmake .. -DCMAKE_POSITION_INDEPENDENT_CODE=ON -DCMAKE_C_FLAGS=\"-fPIC\" -DCMAKE_CXX_FLAGS=\"-fPIC\" -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=\"$BREW_PREFIX\" -DCMAKE_POLICY_VERSION_MINIMUM=3.5 -DGMP_INCLUDE_DIR=\"$GMP_PREFIX/include\" -DGMP_LIBRARY=\"$GMP_PREFIX/lib/libgmp.a\" -DBUILD_BLS_JS_BINDINGS=0 -DBUILD_BLS_PYTHON_BINDINGS=0 -DBUILD_BLS_TESTS=0 -DBUILD_BLS_BENCHMARKS=0\n\
        make -j$(sysctl -n hw.logicalcpu)\nLIB=$(find /tmp/bls-src/build -maxdepth 1 -name \"libbls-dash.a\" 2>/dev/null | head -1)\nif [ -z \"$LIB\" ]; then\n  echo \"ERROR: libdashbls.a not found!\"; find /tmp/bls-src/build -name \"*.a\"; exit 1\nfi\nsudo mkdir -p \"$BREW_PREFIX/lib\" \"$BREW_PREFIX/include/bls-dash\"\nsudo cp \"$LIB\" \"$BREW_PREFIX/lib/libbls-dash.a\"\nsudo find /tmp/bls-src/src -maxdepth 1 -name \"*.hpp\" -exec cp {} \"$BREW_PREFIX/include/bls-dash/\" \\;\nsudo find /tmp/bls-src/build/_deps/relic-src/include -name \"*.h\" -exec cp {} \"$BREW_PREFIX/include/\" \\; 2>/dev/null || true\nsudo find /tmp/bls-src/build/_deps/relic-build/include -name \"*.h\" -exec cp {} \"$BREW_PREFIX/include/\" \\; 2>/dev/null || true\necho \"Library : $(ls -lh $BREW_PREFIX/lib/libbls-dash.a)\"\necho \"Headers : $(ls $BREW_PREFIX/include/bls-dash/)\"\necho \"Relic   : $(ls $BREW_PREFIX/include/relic_conf.h 2>/dev/null || echo MISSING)\"\n"
    - name: Build Babacoin
      run: 'P=$(brew --prefix)

        BOOST_PREFIX=$(brew --prefix boost 2>/dev/null || echo "$P")

        BDB_PREFIX=$(brew --prefix berkeley-db@5 2>/dev/null || brew --prefix berkeley-db 2>/dev/null || echo "$P")

        ./autogen.sh

        ./configure --with-incompatible-bdb --with-boost="$BOOST_PREFIX" --disable-tests --disable-bench --with-gui=qt5 --disable-stacktraces --disable-shared PKG_CONFIG_PATH="$P/opt/openssl@3/lib/pkgconfig:$P/opt/qt@5/lib/pkgconfig:$BDB_PREFIX/lib/pkgconfig" LDFLAGS="-L$P/opt/openssl@3/lib -L$BDB_PREFIX/lib -L$BOOST_PREFIX/lib -L$P/opt/libevent/lib -L$P/opt/zeromq/lib -L$P/opt/miniupnpc/lib -L$P/lib" CPPFLAGS="-I$P/opt/openssl@3/include -I$BDB_PREFIX/include -I$BOOST_PREFIX/include -I$P/opt/libevent/include -I$P/opt/zeromq/include -I$P/opt/miniupnpc/include -I$P/include" CXXFLAGS="-std=c++17" BDB_LIBS="-L$BDB_PREFIX/lib -ldb_cxx" BDB_CFLAGS="-I$BDB_PREFIX/include"

        make -j$(sysctl -n hw.logicalcpu)

        '
    - name: Package
      run: 'mkdir -p dist

        strip src/babacoind src/babacoin-cli src/babacoin-tx src/qt/babacoin-qt

        cp src/babacoind src/babacoin-cli src/babacoin-tx src/qt/babacoin-qt dist/

        tar -czf babacoin-v2.0.0-macos-x86_64.tar.gz -C dist .

        '
    - uses: actions/upload-artifact@v4
      with:
        name: babacoin-macos-x86_64
        path: babacoin-v2.0.0-macos-x86_64.tar.gz
  upload-to-release:
    name: Upload to v2.0.0-test release
    runs-on: ubuntu-22.04
    needs:
    - build-ubuntu-2004
    - build-ubuntu-2004-arm
    - build-macos-intel
    if: always() && (needs.build-ubuntu-2004.result == 'success' || needs.build-ubuntu-2004-arm.result == 'success' || needs.build-macos-intel.result == 'success')
    steps:
    - uses: actions/download-artifact@v4
      with:
        path: artifacts
    - name: List artifacts
      run: find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \)
    - name: Upload to v2.0.0-test release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: for f in $(find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \)); do gh release upload v2.0.0-test "$f" --clobber --repo $GITHUB_REPOSITORY || true; done
