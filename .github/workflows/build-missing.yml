name: Build Missing Platforms (Ubuntu 20.04 + macOS Intel)

on:
  push:
    tags:
      - 'v*-missing'
  workflow_dispatch:

jobs:
  build-ubuntu-2004:
    name: Ubuntu (20.04)
    runs-on: ubuntu-20.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libtool autotools-dev automake pkg-config libssl-dev libevent-dev libboost-all-dev libdb5.3-dev libdb5.3++-dev libminiupnpc-dev libzmq3-dev python3 qtbase5-dev qttools5-dev qttools5-dev-tools libqt5svg5-dev libprotobuf-dev protobuf-compiler libqrencode-dev cmake libgmp-dev git

      - name: Build and install bls-dash
        run: |
          git clone --depth=1 --branch 1.1.0 https://github.com/dashpay/bls-signatures.git /tmp/bls-src
          # GCC 13+ (Ubuntu 24.04) needs explicit <memory> include for unique_ptr
          # Only apply patch on Linux (macOS clang handles it)
          if [ "$(uname)" = "Linux" ]; then
            for f in /tmp/bls-src/src/threshold.cpp /tmp/bls-src/src/threshold.hpp; do
              if [ -f "$f" ]; then
                ( echo '#include <memory>'; cat "$f" ) > "$f.new" && mv "$f.new" "$f"
              fi
            done
          fi
          mkdir -p /tmp/bls-src/build && cd /tmp/bls-src/build
          cmake .. -DCMAKE_POSITION_INDEPENDENT_CODE=ON -DCMAKE_C_FLAGS="-fPIC" -DCMAKE_CXX_FLAGS="-fPIC" -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr/local -DCMAKE_POLICY_VERSION_MINIMUM=3.5 -DBUILD_BLS_JS_BINDINGS=0 -DBUILD_BLS_PYTHON_BINDINGS=0 -DBUILD_BLS_TESTS=0 -DBUILD_BLS_BENCHMARKS=0
          make -j$(nproc)
          LIB=$(find /tmp/bls-src/build -maxdepth 1 -name "libbls-dash.a" 2>/dev/null | head -1)
          if [ -z "$LIB" ]; then
            echo "ERROR: libdashbls.a not found after build!"; find /tmp/bls-src/build -name "*.a"; exit 1
          fi
          sudo cp "$LIB" /usr/local/lib/libbls-dash.a
          sudo mkdir -p /usr/local/include/bls-dash
          sudo find /tmp/bls-src/src -maxdepth 1 -name "*.hpp" -exec cp {} /usr/local/include/bls-dash/ \;
          sudo find /tmp/bls-src/build/_deps/relic-src/include -name "*.h" -exec cp {} /usr/local/include/ \; 2>/dev/null || true
          sudo find /tmp/bls-src/build/_deps/relic-build/include -name "*.h" -exec cp {} /usr/local/include/ \; 2>/dev/null || true
          echo "Library : $(ls -lh /usr/local/lib/libbls-dash.a)"
          echo "Headers : $(ls /usr/local/include/bls-dash/)"
          echo "Relic   : $(ls /usr/local/include/relic_conf.h 2>/dev/null || echo MISSING)"

      - name: Build Babacoin
        run: |
          ./autogen.sh
          ./configure --with-incompatible-bdb BDB_LIBS="-ldb_cxx-5.3" BDB_CFLAGS="-I/usr/include" --disable-tests --disable-bench --with-gui=qt5 --disable-stacktraces --disable-shared CPPFLAGS="-I/usr/local/include" LDFLAGS="-L/usr/local/lib"
          make -j$(nproc)

      - name: Package
        run: |
          mkdir -p dist
          strip src/babacoind src/babacoin-cli src/babacoin-tx src/qt/babacoin-qt
          cp src/babacoind src/babacoin-cli src/babacoin-tx src/qt/babacoin-qt dist/
          tar -czf babacoin-v2.0.0-linux-ubuntu20.04-x86_64.tar.gz -C dist .

      - uses: actions/upload-artifact@v4
        with:
          name: babacoin-ubuntu-20.04
          path: babacoin-v2.0.0-linux-ubuntu20.04-x86_64.tar.gz

