  # ─────────────────────────────────────────
  # Raspberry Pi ARM64 — QEMU
  # ─────────────────────────────────────────


  upload-to-release:
    name: Upload to Existing Release
    runs-on: ubuntu-22.04
    needs:
      - build-ubuntu-2004
      - build-ubuntu-2004-arm
      - build-macos-intel
    if: |
      always() && (
        needs.build-ubuntu-2004.result == 'success' ||
        needs.build-ubuntu-2004-arm.result == 'success' ||
        needs.build-macos-intel.result == 'success'
      )
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          
      - name: List artifacts
        run: find artifacts -type f -name "*.tar.gz" -o -name "*.zip"
      
      - name: Upload to v2.0.0-test release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for f in $(find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \)); do
            gh release upload v2.0.0-test "$f" --clobber --repo $GITHUB_REPOSITORY || true
          done
