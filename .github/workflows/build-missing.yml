          make -j$(nproc)
          LIB=$(find /tmp/bls-src/build -maxdepth 1 -name "libbls-dash.a" 2>/dev/null | head -1)
          if [ -z "$LIB" ]; then
            echo "ERROR: libdashbls.a not found after build!"; find /tmp/bls-src/build -name "*.a"; exit 1
