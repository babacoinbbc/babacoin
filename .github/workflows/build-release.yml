name: Build Babacoin v2.0.0 — Multi-Platform

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ─────────────────────────────────────────
  # Ubuntu 20.04
  # ─────────────────────────────────────────
  build-ubuntu-2004:
    name: Ubuntu (20.04)
    runs-on: ubuntu-20.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libtool autotools-dev automake pkg-config \
            libssl-dev libevent-dev libboost-all-dev \
            libdb5.3-dev libdb5.3++-dev \
            libminiupnpc-dev libzmq3-dev python3

      - name: Build
        run: |
          ./autogen.sh
          ./configure \
            --with-incompatible-bdb \
            BDB_LIBS="-ldb_cxx-5.3" \
            BDB_CFLAGS="-I/usr/include" \
            --disable-tests --disable-bench --without-gui
          make -j$(nproc)

      - name: Package
        run: |
          mkdir -p dist
          strip src/babacoind src/babacoin-cli src/babacoin-tx
          cp src/babacoind src/babacoin-cli src/babacoin-tx dist/
          tar -czf babacoin-v2.0.0-linux-ubuntu20.04-x86_64.tar.gz -C dist .

      - uses: actions/upload-artifact@v4
        with:
          name: babacoin-ubuntu-20.04
          path: babacoin-v2.0.0-linux-ubuntu20.04-x86_64.tar.gz

  # ─────────────────────────────────────────
  # Ubuntu 22.04
  # ─────────────────────────────────────────
  build-ubuntu-2204:
    name: Ubuntu (22.04)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libtool autotools-dev automake pkg-config \
            libssl-dev libevent-dev libboost-all-dev \
            libdb5.3-dev libdb5.3++-dev \
            libminiupnpc-dev libzmq3-dev python3

      - name: Build
        run: |
          ./autogen.sh
          ./configure \
            --with-incompatible-bdb \
            BDB_LIBS="-ldb_cxx-5.3" \
            BDB_CFLAGS="-I/usr/include" \
            --disable-tests --disable-bench --without-gui
          make -j$(nproc)

      - name: Package
        run: |
          mkdir -p dist
          strip src/babacoind src/babacoin-cli src/babacoin-tx
          cp src/babacoind src/babacoin-cli src/babacoin-tx dist/
          tar -czf babacoin-v2.0.0-linux-ubuntu22.04-x86_64.tar.gz -C dist .

      - uses: actions/upload-artifact@v4
        with:
          name: babacoin-ubuntu-22.04
          path: babacoin-v2.0.0-linux-ubuntu22.04-x86_64.tar.gz

  # ─────────────────────────────────────────
  # macOS Intel (x86_64)
  # ─────────────────────────────────────────
  build-macos-intel:
    name: macOS Intel (x86_64)
    runs-on: macos-12
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew update
          for pkg in autoconf automake libtool pkg-config openssl@3 libevent boost miniupnpc zeromq berkeley-db@5; do
            brew install $pkg 2>/dev/null || brew upgrade $pkg 2>/dev/null || true
          done

      - name: Build
        run: |
          P=$(brew --prefix)
          ./autogen.sh
          ./configure \
            --with-incompatible-bdb \
            --disable-tests --disable-bench --without-gui \
            PKG_CONFIG_PATH="$P/opt/openssl@3/lib/pkgconfig:$P/opt/berkeley-db@5/lib/pkgconfig:$P/opt/libevent/lib/pkgconfig" \
            LDFLAGS="-L$P/opt/openssl@3/lib -L$P/opt/berkeley-db@5/lib -L$P/opt/libevent/lib -L$P/opt/boost/lib -L$P/opt/zeromq/lib -L$P/opt/miniupnpc/lib" \
            CPPFLAGS="-I$P/opt/openssl@3/include -I$P/opt/berkeley-db@5/include -I$P/opt/libevent/include -I$P/opt/boost/include -I$P/opt/zeromq/include -I$P/opt/miniupnpc/include" \
            BDB_LIBS="-L$P/opt/berkeley-db@5/lib -ldb_cxx" \
            BDB_CFLAGS="-I$P/opt/berkeley-db@5/include"
          make -j$(sysctl -n hw.logicalcpu)

      - name: Package
        run: |
          mkdir -p dist
          strip src/babacoind src/babacoin-cli src/babacoin-tx
          cp src/babacoind src/babacoin-cli src/babacoin-tx dist/
          tar -czf babacoin-v2.0.0-macos-x86_64.tar.gz -C dist .

      - uses: actions/upload-artifact@v4
        with:
          name: babacoin-macos-x86_64
          path: babacoin-v2.0.0-macos-x86_64.tar.gz

  # ─────────────────────────────────────────
  # macOS Apple Silicon (arm64)
  # ─────────────────────────────────────────
  build-macos-arm64:
    name: macOS Apple Silicon (arm64)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew update
          for pkg in autoconf automake libtool pkg-config openssl@3 libevent boost miniupnpc zeromq berkeley-db@5; do
            brew install $pkg 2>/dev/null || brew upgrade $pkg 2>/dev/null || true
          done

      - name: Build
        run: |
          P=$(brew --prefix)
          ./autogen.sh
          ./configure \
            --with-incompatible-bdb \
            --disable-tests --disable-bench --without-gui \
            PKG_CONFIG_PATH="$P/opt/openssl@3/lib/pkgconfig:$P/opt/berkeley-db@5/lib/pkgconfig:$P/opt/libevent/lib/pkgconfig" \
            LDFLAGS="-L$P/opt/openssl@3/lib -L$P/opt/berkeley-db@5/lib -L$P/opt/libevent/lib -L$P/opt/boost/lib -L$P/opt/zeromq/lib -L$P/opt/miniupnpc/lib" \
            CPPFLAGS="-I$P/opt/openssl@3/include -I$P/opt/berkeley-db@5/include -I$P/opt/libevent/include -I$P/opt/boost/include -I$P/opt/zeromq/include -I$P/opt/miniupnpc/include" \
            BDB_LIBS="-L$P/opt/berkeley-db@5/lib -ldb_cxx" \
            BDB_CFLAGS="-I$P/opt/berkeley-db@5/include"
          make -j$(sysctl -n hw.logicalcpu)

      - name: Package
        run: |
          mkdir -p dist
          strip src/babacoind src/babacoin-cli src/babacoin-tx
          cp src/babacoind src/babacoin-cli src/babacoin-tx dist/
          tar -czf babacoin-v2.0.0-macos-arm64.tar.gz -C dist .

      - uses: actions/upload-artifact@v4
        with:
          name: babacoin-macos-arm64
          path: babacoin-v2.0.0-macos-arm64.tar.gz

  # ─────────────────────────────────────────
  # Raspberry Pi ARM64 — QEMU emulation
  # ─────────────────────────────────────────
  build-raspberrypi:
    name: Raspberry Pi (ARM64)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Build inside ARM64 container
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: false
          file: .github/Dockerfile.rpi
          outputs: type=local,dest=./rpi-output

      - name: Package
        run: |
          mkdir -p dist
          cp rpi-output/babacoind rpi-output/babacoin-cli rpi-output/babacoin-tx dist/ 2>/dev/null || \
          find rpi-output -name "babacoind" -o -name "babacoin-cli" -o -name "babacoin-tx" | xargs -I{} cp {} dist/
          tar -czf babacoin-v2.0.0-raspberry-pi-arm64.tar.gz -C dist .

      - uses: actions/upload-artifact@v4
        with:
          name: babacoin-raspberrypi-arm64
          path: babacoin-v2.0.0-raspberry-pi-arm64.tar.gz

  # ─────────────────────────────────────────
  # Windows x64 (MinGW via depends)
  # ─────────────────────────────────────────
  build-windows:
    name: Windows x64
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install MinGW + depends build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            g++-mingw-w64-x86-64 mingw-w64 \
            autoconf automake libtool pkg-config \
            python3 nsis curl xz-utils bsdmainutils cmake

      - name: Set POSIX threading
        run: |
          sudo update-alternatives --set x86_64-w64-mingw32-gcc /usr/bin/x86_64-w64-mingw32-gcc-posix
          sudo update-alternatives --set x86_64-w64-mingw32-g++ /usr/bin/x86_64-w64-mingw32-g++-posix

      - name: Cache depends
        uses: actions/cache@v4
        with:
          path: depends/built
          key: windows-depends-${{ hashFiles('depends/packages/*.mk') }}

      - name: Build depends (Windows)
        run: |
          make -C depends HOST=x86_64-w64-mingw32 -j$(nproc) \
            NO_QT=1 NO_QR=1 NO_UPNP=0

      - name: Build for Windows
        run: |
          ./autogen.sh
          CONFIG_SITE=$PWD/depends/x86_64-w64-mingw32/share/config.site \
          ./configure \
            --prefix=$PWD/depends/x86_64-w64-mingw32 \
            --host=x86_64-w64-mingw32 \
            --disable-tests --disable-bench --without-gui \
            --with-incompatible-bdb
          make -j$(nproc)

      - name: Package
        run: |
          mkdir -p dist
          cp src/babacoind.exe src/babacoin-cli.exe src/babacoin-tx.exe dist/ 2>/dev/null || \
            cp src/babacoind src/babacoin-cli src/babacoin-tx dist/
          zip -j babacoin-v2.0.0-windows-x86_64.zip dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: babacoin-windows-x64
          path: babacoin-v2.0.0-windows-x86_64.zip

  # ─────────────────────────────────────────
  # Release assets yükle
  # ─────────────────────────────────────────
  upload-release:
    name: Upload to GitHub Release
    needs:
      - build-ubuntu-2004
      - build-ubuntu-2204
      - build-macos-intel
      - build-macos-arm64
      - build-raspberrypi
      - build-windows
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
