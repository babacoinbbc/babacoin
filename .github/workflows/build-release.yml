  # ─────────────────────────────────────────
  # Raspberry Pi ARM64 — QEMU
  # ─────────────────────────────────────────
  build-raspberrypi:
    name: Raspberry Pi (ARM64)
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build in ARM64 container
        run: |
          docker buildx build --platform linux/arm64 --file .github/Dockerfile.rpi --output type=local,dest=./rpi-output .

      - name: Package
        run: |
          mkdir -p dist
          find rpi-output -name "babacoind" -o -name "babacoin-cli" -o -name "babacoin-tx" | xargs -I{} cp {} dist/ 2>/dev/null || true
          ls dist/
          tar -czf babacoin-v2.0.0-raspberry-pi-arm64.tar.gz -C dist .

      - uses: actions/upload-artifact@v4
        with:
          name: babacoin-raspberrypi-arm64
          path: babacoin-v2.0.0-raspberry-pi-arm64.tar.gz

  # ─────────────────────────────────────────
  # Windows x64 — MinGW + depends
  # ─────────────────────────────────────────
  build-windows:
    name: Windows x64
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Install MinGW + tools
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-mingw-w64-x86-64 mingw-w64 autoconf automake libtool pkg-config python3 nsis curl xz-utils bsdmainutils cmake libgmp-dev

      - name: Set POSIX threading
        run: |
          sudo update-alternatives --set x86_64-w64-mingw32-gcc /usr/bin/x86_64-w64-mingw32-gcc-posix
          sudo update-alternatives --set x86_64-w64-mingw32-g++ /usr/bin/x86_64-w64-mingw32-g++-posix

      - name: Cache depends
        uses: actions/cache@v4
        with:
          path: depends/built
          key: windows-depends-${{ hashFiles('depends/packages/*.mk') }}-v3

      - name: Pre-fetch GMP + Qt sources
        run: |
          mkdir -p depends/sources
          curl -L --retry 3 -o depends/sources/gmp-6.3.0.tar.bz2 https://ftp.gnu.org/gnu/gmp/gmp-6.3.0.tar.bz2
          curl -L --retry 3 -o depends/sources/qtbase-opensource-src-5.9.6.tar.xz https://download.qt.io/new_archive/qt/5.9/5.9.6/submodules/qtbase-opensource-src-5.9.6.tar.xz
          curl -L --retry 3 -o depends/sources/qttranslations-opensource-src-5.9.6.tar.xz https://download.qt.io/new_archive/qt/5.9/5.9.6/submodules/qttranslations-opensource-src-5.9.6.tar.xz
          curl -L --retry 3 -o depends/sources/qttools-opensource-src-5.9.6.tar.xz https://download.qt.io/new_archive/qt/5.9/5.9.6/submodules/qttools-opensource-src-5.9.6.tar.xz

      - name: Build depends (bdb, qt, qrencode)
        run: |
          make -C depends HOST=x86_64-w64-mingw32 -j$(nproc)

      - name: Build bls-dash for Windows (cross)
        run: |
          INSTALL_PREFIX=$GITHUB_WORKSPACE/depends/x86_64-w64-mingw32
          # Inline toolchain file - /usr/share/mingw-w64/toolchain-*.cmake yok
          cat > /tmp/mingw-toolchain.cmake <<'EOF'
          SET(CMAKE_SYSTEM_NAME Windows)
          SET(CMAKE_C_COMPILER x86_64-w64-mingw32-gcc-posix)
          SET(CMAKE_CXX_COMPILER x86_64-w64-mingw32-g++-posix)
          SET(CMAKE_RC_COMPILER x86_64-w64-mingw32-windres)
          SET(CMAKE_MAKE_PROGRAM make)
          SET(CMAKE_FIND_ROOT_PATH /usr/x86_64-w64-mingw32)
          SET(CMAKE_FIND_ROOT_PATH_MODE_PROGRAM NEVER)
          SET(CMAKE_FIND_ROOT_PATH_MODE_LIBRARY ONLY)
          SET(CMAKE_FIND_ROOT_PATH_MODE_INCLUDE ONLY)
          EOF
          git clone --depth=1 --branch 1.1.0 https://github.com/dashpay/bls-signatures.git /tmp/bls-win-src
          mkdir -p /tmp/bls-win-src/build && cd /tmp/bls-win-src/build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_POLICY_VERSION_MINIMUM=3.5 -DCMAKE_POSITION_INDEPENDENT_CODE=ON -DCMAKE_C_FLAGS="-fPIC" -DCMAKE_CXX_FLAGS="-fPIC" -DCMAKE_TOOLCHAIN_FILE=/tmp/mingw-toolchain.cmake -DCMAKE_MAKE_PROGRAM=make -DCMAKE_INSTALL_PREFIX=$INSTALL_PREFIX -DBUILD_BLS_JS_BINDINGS=0 -DBUILD_BLS_PYTHON_BINDINGS=0 -DBUILD_BLS_TESTS=0 -DBUILD_BLS_BENCHMARKS=0 -DBUILD_SHARED_LIBS=OFF
          make -j$(nproc)
          LIB=$(find /tmp/bls-win-src/build -maxdepth 1 -name "libbls-dash.a" 2>/dev/null | head -1)
          if [ -z "$LIB" ]; then
            echo "ERROR: libbls-dash.a not found!"; find /tmp/bls-win-src/build -name "*.a"; exit 1
          fi
          mkdir -p $INSTALL_PREFIX/lib $INSTALL_PREFIX/include/bls-dash
          cp "$LIB" $INSTALL_PREFIX/lib/libbls-dash.a
          find /tmp/bls-win-src/src -maxdepth 1 -name "*.hpp" -exec cp {} $INSTALL_PREFIX/include/bls-dash/ \;
          find /tmp/bls-win-src/build/_deps/relic-src/include -name "*.h" -exec cp {} $INSTALL_PREFIX/include/ \; 2>/dev/null || true
          find /tmp/bls-win-src/build/_deps/relic-build/include -name "*.h" -exec cp {} $INSTALL_PREFIX/include/ \; 2>/dev/null || true
          echo "Library   : $(ls -lh $INSTALL_PREFIX/lib/libbls-dash.a)"
          echo "Headers   : $(ls $INSTALL_PREFIX/include/bls-dash/ | head -5)"
          echo "Relic     : $(ls $INSTALL_PREFIX/include/relic_conf.h 2>/dev/null || echo MISSING)"

      - name: Build Babacoin
        run: |
          ./autogen.sh
          CONFIG_SITE=$PWD/depends/x86_64-w64-mingw32/share/config.site ./configure --prefix=$PWD/depends/x86_64-w64-mingw32 --host=x86_64-w64-mingw32 --disable-tests --disable-bench --with-gui=qt5 --disable-stacktraces --disable-shared --with-incompatible-bdb CPPFLAGS="-I$PWD/depends/x86_64-w64-mingw32/include" LDFLAGS="-L$PWD/depends/x86_64-w64-mingw32/lib"
          make -j$(nproc)

      - name: Package
        run: |
          mkdir -p dist
          cp src/babacoind.exe src/babacoin-cli.exe src/babacoin-tx.exe src/qt/babacoin-qt.exe dist/ 2>/dev/null || cp src/babacoind src/babacoin-cli src/babacoin-tx src/qt/babacoin-qt dist/ 2>/dev/null || true
          zip -j babacoin-v2.0.0-windows-x86_64.zip dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: babacoin-windows-x64
          path: babacoin-v2.0.0-windows-x86_64.zip

  # ─────────────────────────────────────────
  # Release — sadece tag push'ta
  # ─────────────────────────────────────────
  upload-release:
    name: Upload to GitHub Release
    needs:
      - build-ubuntu-2004
      - build-ubuntu-2004-arm
      - build-ubuntu-2204
      - build-ubuntu-2204-arm
      - build-ubuntu-2404
      - build-ubuntu-2404-arm
      - build-macos-intel
      - build-macos-arm64
      - build-raspberrypi
      - build-windows
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    # Tag push + en az bir platform başarılı olduğunda çalışır
    # (queued/cancelled platformları bekletmez)
    if: |
      always() &&
      startsWith(github.ref, 'refs/tags/') &&
      (
        needs.build-ubuntu-2004.result == 'success' ||
        needs.build-ubuntu-2004-arm.result == 'success' ||
        needs.build-ubuntu-2204.result == 'success' ||
        needs.build-ubuntu-2204-arm.result == 'success' ||
        needs.build-ubuntu-2404.result == 'success' ||
        needs.build-ubuntu-2404-arm.result == 'success' ||
        needs.build-macos-intel.result == 'success' ||
        needs.build-macos-arm64.result == 'success' ||
        needs.build-raspberrypi.result == 'success' ||
        needs.build-windows.result == 'success'
      )
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: List downloaded artifacts
        run: |
          echo "Artifacts indirildi:"
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec ls -lh {} \;
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Babacoin ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-test') || contains(github.ref_name, '-rc') }}
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
