name: Build Babacoin v2.0.0 — Multi-Platform

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:

  # ─────────────────────────────────────────
  # Ubuntu 20.04 / 22.04
  # ─────────────────────────────────────────
  build-ubuntu:
    name: Ubuntu (${{ matrix.ubuntu }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - ubuntu: "20.04"
            runner: ubuntu-20.04
          - ubuntu: "22.04"
            runner: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libtool autotools-dev automake pkg-config \
            libssl-dev libevent-dev libboost-all-dev \
            libdb5.3-dev libdb5.3++-dev \
            libminiupnpc-dev libzmq3-dev \
            python3 python3-pip

      - name: Build
        run: |
          ./autogen.sh
          ./configure \
            --with-incompatible-bdb \
            BDB_LIBS="-ldb_cxx-5.3" \
            BDB_CFLAGS="-I/usr/include" \
            --disable-tests \
            --disable-bench \
            --without-gui
          make -j$(nproc)

      - name: Package
        run: |
          mkdir -p release
          strip src/babacoind src/babacoin-cli src/babacoin-tx
          cp src/babacoind src/babacoin-cli src/babacoin-tx release/
          tar -czf babacoin-v2.0.0-linux-ubuntu${{ matrix.ubuntu }}-x86_64.tar.gz -C release .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: babacoin-ubuntu-${{ matrix.ubuntu }}
          path: babacoin-v2.0.0-linux-ubuntu${{ matrix.ubuntu }}-x86_64.tar.gz

  # ─────────────────────────────────────────
  # macOS (Intel + Apple Silicon)
  # ─────────────────────────────────────────
  build-macos:
    name: macOS (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: macos-12
          - arch: arm64
            runner: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Homebrew)
        run: |
          brew update
          brew install autoconf automake libtool pkg-config \
            openssl@3 libevent boost miniupnpc zeromq berkeley-db@5

      - name: Build
        env:
          PKG_CONFIG_PATH: "/usr/local/opt/openssl@3/lib/pkgconfig:/opt/homebrew/opt/openssl@3/lib/pkgconfig"
          LDFLAGS: "-L/usr/local/opt/openssl@3/lib -L/opt/homebrew/opt/openssl@3/lib -L/usr/local/opt/berkeley-db@5/lib -L/opt/homebrew/opt/berkeley-db@5/lib"
          CPPFLAGS: "-I/usr/local/opt/openssl@3/include -I/opt/homebrew/opt/openssl@3/include -I/usr/local/opt/berkeley-db@5/include -I/opt/homebrew/opt/berkeley-db@5/include"
        run: |
          ./autogen.sh
          ./configure \
            --with-incompatible-bdb \
            --disable-tests \
            --disable-bench \
            --without-gui
          make -j$(sysctl -n hw.logicalcpu)

      - name: Package
        run: |
          mkdir -p release
          strip src/babacoind src/babacoin-cli src/babacoin-tx
          cp src/babacoind src/babacoin-cli src/babacoin-tx release/
          tar -czf babacoin-v2.0.0-macos-${{ matrix.arch }}.tar.gz -C release .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: babacoin-macos-${{ matrix.arch }}
          path: babacoin-v2.0.0-macos-${{ matrix.arch }}.tar.gz

  # ─────────────────────────────────────────
  # Raspberry Pi (ARM64 — Pi 4/5)
  # ─────────────────────────────────────────
  build-raspberrypi:
    name: Raspberry Pi (ARM64)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compile toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            autoconf automake libtool pkg-config python3

      - name: Build depends (cross-compile)
        run: |
          cd depends
          make HOST=aarch64-linux-gnu -j$(nproc) \
            NO_QT=1 NO_QR=1 NO_ZMQ=0 NO_UPNP=0
          cd ..

      - name: Build for ARM64
        run: |
          ./autogen.sh
          CONFIG_SITE=$PWD/depends/aarch64-linux-gnu/share/config.site \
          ./configure \
            --prefix=$PWD/depends/aarch64-linux-gnu \
            --host=aarch64-linux-gnu \
            --disable-tests \
            --disable-bench \
            --without-gui \
            --with-incompatible-bdb
          make -j$(nproc)

      - name: Package
        run: |
          mkdir -p release
          aarch64-linux-gnu-strip src/babacoind src/babacoin-cli src/babacoin-tx
          cp src/babacoind src/babacoin-cli src/babacoin-tx release/
          tar -czf babacoin-v2.0.0-raspberry-pi-arm64.tar.gz -C release .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: babacoin-raspberrypi-arm64
          path: babacoin-v2.0.0-raspberry-pi-arm64.tar.gz

  # ─────────────────────────────────────────
  # Windows x64 (MinGW cross-compile)
  # ─────────────────────────────────────────
  build-windows:
    name: Windows x64
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install MinGW toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            g++-mingw-w64-x86-64 mingw-w64 \
            autoconf automake libtool pkg-config python3 nsis

      - name: Set POSIX thread model
        run: |
          sudo update-alternatives --set x86_64-w64-mingw32-gcc \
            /usr/bin/x86_64-w64-mingw32-gcc-posix
          sudo update-alternatives --set x86_64-w64-mingw32-g++ \
            /usr/bin/x86_64-w64-mingw32-g++-posix

      - name: Build depends (cross-compile)
        run: |
          cd depends
          make HOST=x86_64-w64-mingw32 -j$(nproc) \
            NO_QT=1 NO_QR=1
          cd ..

      - name: Build for Windows
        run: |
          ./autogen.sh
          CONFIG_SITE=$PWD/depends/x86_64-w64-mingw32/share/config.site \
          ./configure \
            --prefix=$PWD/depends/x86_64-w64-mingw32 \
            --host=x86_64-w64-mingw32 \
            --disable-tests \
            --disable-bench \
            --without-gui \
            --with-incompatible-bdb
          make -j$(nproc)

      - name: Package
        run: |
          mkdir -p release
          x86_64-w64-mingw32-strip src/babacoind.exe src/babacoin-cli.exe src/babacoin-tx.exe || true
          cp src/babacoind.exe src/babacoin-cli.exe src/babacoin-tx.exe release/ 2>/dev/null || \
            cp src/babacoind src/babacoin-cli src/babacoin-tx release/
          zip -j babacoin-v2.0.0-windows-x86_64.zip release/*

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: babacoin-windows-x64
          path: babacoin-v2.0.0-windows-x86_64.zip

  # ─────────────────────────────────────────
  # GitHub Release — tüm artifactları toplar
  # ─────────────────────────────────────────
  create-release:
    name: Create GitHub Release v2.0.0
    needs:
      - build-ubuntu
      - build-macos
      - build-raspberrypi
      - build-windows
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List files
        run: find artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Babacoin Core v2.0.0"
          draft: false
          prerelease: false
          body: |
            ## Babacoin Core v2.0.0

            ### Değişiklikler
            - ✅ Ubuntu 20.04 / 22.04 / 24.04 desteği
            - ✅ macOS Intel (x86_64) ve Apple Silicon (arm64) desteği
            - ✅ Raspberry Pi 4/5 (ARM64) desteği
            - ✅ Windows x64 desteği
            - 🔒 Founder cüzdan adresi güncellendi
            - 💰 Collateral 10.000.000 BBC (aktif: block 925.000)
            - 🔧 OpenSSL 3.x uyumluluğu
            - 🔧 BerkeleyDB 5.3 desteği
            - 🔧 C++17 standardına geçiş

            ### İndirme
            | Platform | Dosya |
            |---|---|
            | Ubuntu 20.04 | `babacoin-v2.0.0-linux-ubuntu20.04-x86_64.tar.gz` |
            | Ubuntu 22.04 | `babacoin-v2.0.0-linux-ubuntu22.04-x86_64.tar.gz` |
            | macOS Intel | `babacoin-v2.0.0-macos-x86_64.tar.gz` |
            | macOS Apple Silicon | `babacoin-v2.0.0-macos-arm64.tar.gz` |
            | Raspberry Pi 4/5 | `babacoin-v2.0.0-raspberry-pi-arm64.tar.gz` |
            | Windows x64 | `babacoin-v2.0.0-windows-x86_64.zip` |
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
