name: Build Babacoin v2.0.0 — Multi-Platform

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ─────────────────────────────────────────
  # Ubuntu 20.04
  # ─────────────────────────────────────────
  build-ubuntu-2004:
    name: Ubuntu (20.04)
    runs-on: ubuntu-20.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libtool autotools-dev automake pkg-config \
            libssl-dev libevent-dev libboost-all-dev \
            libdb5.3-dev libdb5.3++-dev \
            libminiupnpc-dev libzmq3-dev python3 \
            cmake libgmp-dev git

      - name: Build and install bls-dash
        run: |
          git clone --depth=1 --branch 1.1.0 https://github.com/dashpay/bls-signatures.git /tmp/bls-src
          mkdir -p /tmp/bls-src/build && cd /tmp/bls-src/build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_BLS_JS_BINDINGS=0 \
            -DBUILD_BLS_PYTHON_BINDINGS=0 \
            -DBUILD_BLS_TESTS=0 \
            -DBUILD_BLS_BENCHMARKS=0
          make -j$(nproc)
          sudo make install
          sudo mkdir -p /usr/local/include/bls-dash
          sudo find /tmp/bls-src/src -name "*.hpp" -exec cp {} /usr/local/include/bls-dash/ \;
          sudo find /tmp/bls-src/build -name "libdashbls.a" | head -1 | xargs -I{} sudo cp {} /usr/local/lib/libdashbls.a
          sudo ln -sf /usr/local/lib/libdashbls.a /usr/local/lib/libbls-dash.a
          echo "bls-dash installed: $(ls /usr/local/include/bls-dash/)"

      - name: Build Babacoin
        run: |
          ./autogen.sh
          ./configure \
            --with-incompatible-bdb \
            BDB_LIBS="-ldb_cxx-5.3" \
            BDB_CFLAGS="-I/usr/include" \
            --disable-tests --disable-bench --without-gui \
            CPPFLAGS="-I/usr/local/include" \
            LDFLAGS="-L/usr/local/lib"
          make -j$(nproc)

      - name: Package
        run: |
          mkdir -p dist
          strip src/babacoind src/babacoin-cli src/babacoin-tx
          cp src/babacoind src/babacoin-cli src/babacoin-tx dist/
          tar -czf babacoin-v2.0.0-linux-ubuntu20.04-x86_64.tar.gz -C dist .

      - uses: actions/upload-artifact@v4
        with:
          name: babacoin-ubuntu-20.04
          path: babacoin-v2.0.0-linux-ubuntu20.04-x86_64.tar.gz

  # ─────────────────────────────────────────
  # Ubuntu 22.04
  # ─────────────────────────────────────────
  build-ubuntu-2204:
    name: Ubuntu (22.04)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libtool autotools-dev automake pkg-config \
            libssl-dev libevent-dev libboost-all-dev \
            libdb5.3-dev libdb5.3++-dev \
            libminiupnpc-dev libzmq3-dev python3 \
            cmake libgmp-dev git

          git clone --depth=1 --branch 1.1.0 https://github.com/dashpay/bls-signatures.git /tmp/bls-src
        run: |
          git clone --depth=1 --branch 1.1.0 https://github.com/dashpay/bls-signatures.git /tmp/bls-src
          mkdir -p /tmp/bls-src/build && cd /tmp/bls-src/build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_BLS_JS_BINDINGS=0 \
            -DBUILD_BLS_PYTHON_BINDINGS=0 \
            -DBUILD_BLS_TESTS=0 \
            -DBUILD_BLS_BENCHMARKS=0
          make -j$(nproc)
          sudo make install
          sudo mkdir -p /usr/local/include/bls-dash
          sudo find /tmp/bls-src/src -name "*.hpp" -exec cp {} /usr/local/include/bls-dash/ \;
          sudo find /tmp/bls-src/build -name "libdashbls.a" | head -1 | xargs -I{} sudo cp {} /usr/local/lib/libdashbls.a
          sudo ln -sf /usr/local/lib/libdashbls.a /usr/local/lib/libbls-dash.a
          echo "bls-dash installed: $(ls /usr/local/include/bls-dash/)"

      - name: Build Babacoin
        run: |
          ./autogen.sh
          ./configure \
            --with-incompatible-bdb \
            BDB_LIBS="-ldb_cxx-5.3" \
            BDB_CFLAGS="-I/usr/include" \
            --disable-tests --disable-bench --without-gui \
            CPPFLAGS="-I/usr/local/include" \
            LDFLAGS="-L/usr/local/lib"
          make -j$(nproc)

      - name: Package
        run: |
          mkdir -p dist
          strip src/babacoind src/babacoin-cli src/babacoin-tx
          cp src/babacoind src/babacoin-cli src/babacoin-tx dist/
          tar -czf babacoin-v2.0.0-linux-ubuntu22.04-x86_64.tar.gz -C dist .

      - uses: actions/upload-artifact@v4
        with:
          name: babacoin-ubuntu-22.04
          path: babacoin-v2.0.0-linux-ubuntu22.04-x86_64.tar.gz

  # ─────────────────────────────────────────
  # macOS Intel (x86_64)
  # ─────────────────────────────────────────
  build-macos-intel:
    name: macOS Intel (x86_64)
    runs-on: macos-12
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew update
          for pkg in autoconf automake libtool pkg-config openssl@3 \
                     libevent boost miniupnpc zeromq berkeley-db@5 cmake gmp; do
            brew install $pkg 2>/dev/null || true
          done

      - name: Build and install bls-dash
        run: |
          git clone --depth=1 --branch 1.1.0 https://github.com/dashpay/bls-signatures.git /tmp/bls-src
          mkdir -p /tmp/bls-src/build && cd /tmp/bls-src/build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_BLS_JS_BINDINGS=0 \
            -DBUILD_BLS_PYTHON_BINDINGS=0 \
            -DBUILD_BLS_TESTS=0 \
            -DBUILD_BLS_BENCHMARKS=0
          make -j$(sysctl -n hw.logicalcpu)
          sudo make install
          sudo mkdir -p /usr/local/include/bls-dash
          sudo find /tmp/bls-src/src -name "*.hpp" -exec cp {} /usr/local/include/bls-dash/ \;
          find /tmp/bls-src/build -name "libdashbls.a" | head -1 | xargs -I{} sudo cp {} /usr/local/lib/libdashbls.a
          sudo ln -sf /usr/local/lib/libdashbls.a /usr/local/lib/libbls-dash.a
          echo "bls-dash: $(ls /usr/local/include/bls-dash/)"

      - name: Build Babacoin
        run: |
          P=$(brew --prefix)
          ./autogen.sh
          ./configure \
            --with-incompatible-bdb \
            --disable-tests --disable-bench --without-gui \
            PKG_CONFIG_PATH="$P/opt/openssl@3/lib/pkgconfig:$P/opt/berkeley-db@5/lib/pkgconfig" \
            LDFLAGS="-L$P/opt/openssl@3/lib -L$P/opt/berkeley-db@5/lib -L$P/opt/libevent/lib -L$P/opt/boost/lib -L$P/opt/zeromq/lib -L$P/opt/miniupnpc/lib -L/usr/local/lib" \
            CPPFLAGS="-I$P/opt/openssl@3/include -I$P/opt/berkeley-db@5/include -I$P/opt/libevent/include -I$P/opt/boost/include -I$P/opt/zeromq/include -I$P/opt/miniupnpc/include -I/usr/local/include" \
            BDB_LIBS="-L$P/opt/berkeley-db@5/lib -ldb_cxx" \
            BDB_CFLAGS="-I$P/opt/berkeley-db@5/include"
          make -j$(sysctl -n hw.logicalcpu)

      - name: Package
        run: |
          mkdir -p dist
          strip src/babacoind src/babacoin-cli src/babacoin-tx
          cp src/babacoind src/babacoin-cli src/babacoin-tx dist/
          tar -czf babacoin-v2.0.0-macos-x86_64.tar.gz -C dist .

      - uses: actions/upload-artifact@v4
        with:
          name: babacoin-macos-x86_64
          path: babacoin-v2.0.0-macos-x86_64.tar.gz

  # ─────────────────────────────────────────
  # macOS Apple Silicon (arm64)
  # ─────────────────────────────────────────
  build-macos-arm64:
    name: macOS Apple Silicon (arm64)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew update
          for pkg in autoconf automake libtool pkg-config openssl@3 \
                     libevent boost miniupnpc zeromq berkeley-db@5 cmake gmp; do
            brew install $pkg 2>/dev/null || true
          done

      - name: Build and install bls-dash
        run: |
          git clone --depth=1 --branch 1.1.0 https://github.com/dashpay/bls-signatures.git /tmp/bls-src
          mkdir -p /tmp/bls-src/build && cd /tmp/bls-src/build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_BLS_JS_BINDINGS=0 \
            -DBUILD_BLS_PYTHON_BINDINGS=0 \
            -DBUILD_BLS_TESTS=0 \
            -DBUILD_BLS_BENCHMARKS=0
          make -j$(sysctl -n hw.logicalcpu)
          sudo make install
          sudo mkdir -p /usr/local/include/bls-dash
          sudo find /tmp/bls-src/src -name "*.hpp" -exec cp {} /usr/local/include/bls-dash/ \;
          find /tmp/bls-src/build -name "libdashbls.a" | head -1 | xargs -I{} sudo cp {} /usr/local/lib/libdashbls.a
          sudo ln -sf /usr/local/lib/libdashbls.a /usr/local/lib/libbls-dash.a
          echo "bls-dash: $(ls /usr/local/include/bls-dash/)"

      - name: Build Babacoin
        run: |
          P=$(brew --prefix)
          ./autogen.sh
          ./configure \
            --with-incompatible-bdb \
            --disable-tests --disable-bench --without-gui \
            PKG_CONFIG_PATH="$P/opt/openssl@3/lib/pkgconfig:$P/opt/berkeley-db@5/lib/pkgconfig" \
            LDFLAGS="-L$P/opt/openssl@3/lib -L$P/opt/berkeley-db@5/lib -L$P/opt/libevent/lib -L$P/opt/boost/lib -L$P/opt/zeromq/lib -L$P/opt/miniupnpc/lib -L/usr/local/lib" \
            CPPFLAGS="-I$P/opt/openssl@3/include -I$P/opt/berkeley-db@5/include -I$P/opt/libevent/include -I$P/opt/boost/include -I$P/opt/zeromq/include -I$P/opt/miniupnpc/include -I/usr/local/include" \
            BDB_LIBS="-L$P/opt/berkeley-db@5/lib -ldb_cxx" \
            BDB_CFLAGS="-I$P/opt/berkeley-db@5/include"
          make -j$(sysctl -n hw.logicalcpu)

      - name: Package
        run: |
          mkdir -p dist
          strip src/babacoind src/babacoin-cli src/babacoin-tx
          cp src/babacoind src/babacoin-cli src/babacoin-tx dist/
          tar -czf babacoin-v2.0.0-macos-arm64.tar.gz -C dist .

      - uses: actions/upload-artifact@v4
        with:
          name: babacoin-macos-arm64
          path: babacoin-v2.0.0-macos-arm64.tar.gz

  # ─────────────────────────────────────────
  # Raspberry Pi ARM64 — QEMU
  # ─────────────────────────────────────────
  build-raspberrypi:
    name: Raspberry Pi (ARM64)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build in ARM64 container
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --file .github/Dockerfile.rpi \
            --output type=local,dest=./rpi-output \
            .

      - name: Package
        run: |
          mkdir -p dist
          find rpi-output -name "babacoind" -o -name "babacoin-cli" -o -name "babacoin-tx" \
            | xargs -I{} cp {} dist/ 2>/dev/null || true
          ls dist/
          tar -czf babacoin-v2.0.0-raspberry-pi-arm64.tar.gz -C dist .

      - uses: actions/upload-artifact@v4
        with:
          name: babacoin-raspberrypi-arm64
          path: babacoin-v2.0.0-raspberry-pi-arm64.tar.gz

  # ─────────────────────────────────────────
  # Windows x64 — MinGW + depends
  # ─────────────────────────────────────────
  build-windows:
    name: Windows x64
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install MinGW + tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            g++-mingw-w64-x86-64 mingw-w64 \
            autoconf automake libtool pkg-config \
            python3 nsis curl xz-utils bsdmainutils cmake libgmp-dev

      - name: Set POSIX threading
        run: |
          sudo update-alternatives --set x86_64-w64-mingw32-gcc \
            /usr/bin/x86_64-w64-mingw32-gcc-posix
          sudo update-alternatives --set x86_64-w64-mingw32-g++ \
            /usr/bin/x86_64-w64-mingw32-g++-posix

      - name: Cache depends
        uses: actions/cache@v4
        with:
          path: depends/built
          key: windows-depends-${{ hashFiles('depends/packages/*.mk') }}-v3

      - name: Build depends (no bls-dash/cmake)
        run: |
          make -C depends HOST=x86_64-w64-mingw32 -j$(nproc) \
            NO_QT=1 NO_QR=1

      - name: Build bls-dash for Windows (cross)
        run: |
          git clone --depth=1 https://github.com/dashpay/bls-signatures.git /tmp/bls-win-src
          mkdir -p /tmp/bls-win-src/build && cd /tmp/bls-win-src/build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=/usr/share/mingw-w64/toolchain-x86_64-w64-mingw32.cmake \
            -DCMAKE_SYSTEM_NAME=Windows \
            -DCMAKE_C_COMPILER=x86_64-w64-mingw32-gcc-posix \
            -DCMAKE_CXX_COMPILER=x86_64-w64-mingw32-g++-posix \
            -DCMAKE_INSTALL_PREFIX=$GITHUB_WORKSPACE/depends/x86_64-w64-mingw32 \
            -DBUILD_BLS_JS_BINDINGS=0 \
            -DBUILD_BLS_PYTHON_BINDINGS=0 \
            -DBUILD_BLS_TESTS=0 \
            -DBUILD_BLS_BENCHMARKS=0 \
            -DBUILD_SHARED_LIBS=OFF || true
          make -j$(nproc) || true
          # Fallback: just copy headers for compilation
          DEST=$GITHUB_WORKSPACE/depends/x86_64-w64-mingw32/include/bls-dash
          mkdir -p $DEST
          find /tmp/bls-win-src/src -name "*.hpp" -path "*/bls/*" \
            -exec cp {} $DEST/ \; 2>/dev/null || true
          find /tmp/bls-win-src/include -name "*.hpp" \
            -exec cp {} $DEST/ \; 2>/dev/null || true
          echo "Win bls headers: $(ls $DEST 2>/dev/null | head -5)"

      - name: Build Babacoin
        run: |
          ./autogen.sh
          CONFIG_SITE=$PWD/depends/x86_64-w64-mingw32/share/config.site \
          ./configure \
            --prefix=$PWD/depends/x86_64-w64-mingw32 \
            --host=x86_64-w64-mingw32 \
            --disable-tests --disable-bench --without-gui \
            --with-incompatible-bdb \
            CPPFLAGS="-I$PWD/depends/x86_64-w64-mingw32/include" \
            LDFLAGS="-L$PWD/depends/x86_64-w64-mingw32/lib"
          make -j$(nproc)

      - name: Package
        run: |
          mkdir -p dist
          cp src/babacoind.exe src/babacoin-cli.exe src/babacoin-tx.exe dist/ 2>/dev/null || \
            cp src/babacoind src/babacoin-cli src/babacoin-tx dist/ 2>/dev/null || true
          zip -j babacoin-v2.0.0-windows-x86_64.zip dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: babacoin-windows-x64
          path: babacoin-v2.0.0-windows-x86_64.zip

  # ─────────────────────────────────────────
  # Release — sadece tag push'ta
  # ─────────────────────────────────────────
  upload-release:
    name: Upload to GitHub Release
    needs:
      - build-ubuntu-2004
      - build-ubuntu-2204
      - build-macos-intel
      - build-macos-arm64
      - build-raspberrypi
      - build-windows
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
