name: Build Babacoin v2.0.0 — Multi-Platform

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:

  # ─────────────────────────────────────────
  # Ubuntu 20.04
  # ─────────────────────────────────────────
  build-ubuntu-2004:
    name: Ubuntu (20.04)
    runs-on: ubuntu-20.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libtool autotools-dev automake pkg-config \
            libssl-dev libevent-dev libboost-all-dev \
            libdb5.3-dev libdb5.3++-dev \
            libminiupnpc-dev libzmq3-dev python3

      - name: Build
        run: |
          ./autogen.sh
          ./configure \
            --with-incompatible-bdb \
            BDB_LIBS="-ldb_cxx-5.3" \
            BDB_CFLAGS="-I/usr/include" \
            --disable-tests --disable-bench --without-gui
          make -j$(nproc)

      - name: Package
        run: |
          mkdir -p release
          strip src/babacoind src/babacoin-cli src/babacoin-tx
          cp src/babacoind src/babacoin-cli src/babacoin-tx release/
          tar -czf babacoin-v2.0.0-linux-ubuntu20.04-x86_64.tar.gz -C release .

      - uses: actions/upload-artifact@v4
        with:
          name: babacoin-ubuntu-20.04
          path: babacoin-v2.0.0-linux-ubuntu20.04-x86_64.tar.gz

  # ─────────────────────────────────────────
  # Ubuntu 22.04
  # ─────────────────────────────────────────
  build-ubuntu-2204:
    name: Ubuntu (22.04)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libtool autotools-dev automake pkg-config \
            libssl-dev libevent-dev libboost-all-dev \
            libdb5.3-dev libdb5.3++-dev \
            libminiupnpc-dev libzmq3-dev python3

      - name: Build
        run: |
          ./autogen.sh
          ./configure \
            --with-incompatible-bdb \
            BDB_LIBS="-ldb_cxx-5.3" \
            BDB_CFLAGS="-I/usr/include" \
            --disable-tests --disable-bench --without-gui
          make -j$(nproc)

      - name: Package
        run: |
          mkdir -p release
          strip src/babacoind src/babacoin-cli src/babacoin-tx
          cp src/babacoind src/babacoin-cli src/babacoin-tx release/
          tar -czf babacoin-v2.0.0-linux-ubuntu22.04-x86_64.tar.gz -C release .

      - uses: actions/upload-artifact@v4
        with:
          name: babacoin-ubuntu-22.04
          path: babacoin-v2.0.0-linux-ubuntu22.04-x86_64.tar.gz

  # ─────────────────────────────────────────
  # macOS Intel (x86_64) — macos-12 runner
  # ─────────────────────────────────────────
  build-macos-intel:
    name: macOS Intel (x86_64)
    runs-on: macos-12
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew update
          brew install autoconf automake libtool pkg-config \
            openssl@3 libevent boost miniupnpc zeromq berkeley-db@5 || true

      - name: Build
        run: |
          BREW_PFX=$(brew --prefix)
          ./autogen.sh
          ./configure \
            --with-incompatible-bdb \
            --disable-tests --disable-bench --without-gui \
            PKG_CONFIG_PATH="$BREW_PFX/opt/openssl@3/lib/pkgconfig" \
            LDFLAGS="-L$BREW_PFX/opt/openssl@3/lib -L$BREW_PFX/opt/berkeley-db@5/lib -L$BREW_PFX/opt/libevent/lib -L$BREW_PFX/opt/boost/lib" \
            CPPFLAGS="-I$BREW_PFX/opt/openssl@3/include -I$BREW_PFX/opt/berkeley-db@5/include -I$BREW_PFX/opt/libevent/include -I$BREW_PFX/opt/boost/include" \
            BDB_LIBS="-L$BREW_PFX/opt/berkeley-db@5/lib -ldb_cxx" \
            BDB_CFLAGS="-I$BREW_PFX/opt/berkeley-db@5/include"
          make -j$(sysctl -n hw.logicalcpu)

      - name: Package
        run: |
          mkdir -p release
          strip src/babacoind src/babacoin-cli src/babacoin-tx
          cp src/babacoind src/babacoin-cli src/babacoin-tx release/
          tar -czf babacoin-v2.0.0-macos-x86_64.tar.gz -C release .

      - uses: actions/upload-artifact@v4
        with:
          name: babacoin-macos-x86_64
          path: babacoin-v2.0.0-macos-x86_64.tar.gz

  # ─────────────────────────────────────────
  # macOS Apple Silicon (arm64) — macos-14
  # ─────────────────────────────────────────
  build-macos-arm64:
    name: macOS Apple Silicon (arm64)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew update
          brew install autoconf automake libtool pkg-config \
            openssl@3 libevent boost miniupnpc zeromq berkeley-db@5 || true

      - name: Build
        run: |
          BREW_PFX=$(brew --prefix)
          ./autogen.sh
          ./configure \
            --with-incompatible-bdb \
            --disable-tests --disable-bench --without-gui \
            PKG_CONFIG_PATH="$BREW_PFX/opt/openssl@3/lib/pkgconfig" \
            LDFLAGS="-L$BREW_PFX/opt/openssl@3/lib -L$BREW_PFX/opt/berkeley-db@5/lib -L$BREW_PFX/opt/libevent/lib -L$BREW_PFX/opt/boost/lib" \
            CPPFLAGS="-I$BREW_PFX/opt/openssl@3/include -I$BREW_PFX/opt/berkeley-db@5/include -I$BREW_PFX/opt/libevent/include -I$BREW_PFX/opt/boost/include" \
            BDB_LIBS="-L$BREW_PFX/opt/berkeley-db@5/lib -ldb_cxx" \
            BDB_CFLAGS="-I$BREW_PFX/opt/berkeley-db@5/include"
          make -j$(sysctl -n hw.logicalcpu)

      - name: Package
        run: |
          mkdir -p release
          strip src/babacoind src/babacoin-cli src/babacoin-tx
          cp src/babacoind src/babacoin-cli src/babacoin-tx release/
          tar -czf babacoin-v2.0.0-macos-arm64.tar.gz -C release .

      - uses: actions/upload-artifact@v4
        with:
          name: babacoin-macos-arm64
          path: babacoin-v2.0.0-macos-arm64.tar.gz

  # ─────────────────────────────────────────
  # Raspberry Pi (ARM64) — multiarch cross-compile
  # ─────────────────────────────────────────
  build-raspberrypi:
    name: Raspberry Pi (ARM64)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Enable ARM64 multiarch
        run: |
          sudo dpkg --add-architecture arm64
          sudo sed -i 's/^deb /deb [arch=amd64] /' /etc/apt/sources.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-updates main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list
          sudo apt-get update || true

      - name: Install cross toolchain and ARM64 libs
        run: |
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            autoconf automake libtool pkg-config python3
          sudo apt-get install -y \
            libssl-dev:arm64 \
            libevent-dev:arm64 \
            libboost-all-dev:arm64 \
            libdb5.3-dev:arm64 libdb5.3++-dev:arm64 \
            libzmq3-dev:arm64 \
            libminiupnpc-dev:arm64 || true

      - name: Build for ARM64
        run: |
          ./autogen.sh
          PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig \
          ./configure \
            --host=aarch64-linux-gnu \
            --with-incompatible-bdb \
            --disable-tests --disable-bench --without-gui \
            BDB_LIBS="-ldb_cxx-5.3" \
            BDB_CFLAGS="-I/usr/include"
          make -j$(nproc)

      - name: Package
        run: |
          mkdir -p release
          aarch64-linux-gnu-strip src/babacoind src/babacoin-cli src/babacoin-tx
          cp src/babacoind src/babacoin-cli src/babacoin-tx release/
          tar -czf babacoin-v2.0.0-raspberry-pi-arm64.tar.gz -C release .

      - uses: actions/upload-artifact@v4
        with:
          name: babacoin-raspberrypi-arm64
          path: babacoin-v2.0.0-raspberry-pi-arm64.tar.gz

  # ─────────────────────────────────────────
  # Windows x64 (MinGW cross-compile)
  # ─────────────────────────────────────────
  build-windows:
    name: Windows x64
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install MinGW toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            g++-mingw-w64-x86-64 mingw-w64 \
            autoconf automake libtool pkg-config python3 nsis

      - name: Set POSIX thread model
        run: |
          sudo update-alternatives --set x86_64-w64-mingw32-gcc \
            /usr/bin/x86_64-w64-mingw32-gcc-posix
          sudo update-alternatives --set x86_64-w64-mingw32-g++ \
            /usr/bin/x86_64-w64-mingw32-g++-posix

      - name: Build depends
        run: |
          cd depends
          make HOST=x86_64-w64-mingw32 -j$(nproc) NO_QT=1 NO_QR=1
          cd ..

      - name: Build for Windows
        run: |
          ./autogen.sh
          CONFIG_SITE=$PWD/depends/x86_64-w64-mingw32/share/config.site \
          ./configure \
            --prefix=$PWD/depends/x86_64-w64-mingw32 \
            --host=x86_64-w64-mingw32 \
            --disable-tests --disable-bench --without-gui \
            --with-incompatible-bdb
          make -j$(nproc)

      - name: Package
        run: |
          mkdir -p release
          x86_64-w64-mingw32-strip src/babacoind.exe src/babacoin-cli.exe src/babacoin-tx.exe 2>/dev/null || \
            strip src/babacoind src/babacoin-cli src/babacoin-tx 2>/dev/null || true
          cp src/babacoind.exe src/babacoin-cli.exe src/babacoin-tx.exe release/ 2>/dev/null || \
            cp src/babacoind src/babacoin-cli src/babacoin-tx release/ 2>/dev/null || true
          zip -j babacoin-v2.0.0-windows-x86_64.zip release/*

      - uses: actions/upload-artifact@v4
        with:
          name: babacoin-windows-x64
          path: babacoin-v2.0.0-windows-x86_64.zip

  # ─────────────────────────────────────────
  # GitHub Release
  # ─────────────────────────────────────────
  create-release:
    name: Upload to GitHub Release
    needs:
      - build-ubuntu-2004
      - build-ubuntu-2204
      - build-macos-intel
      - build-macos-arm64
      - build-raspberrypi
      - build-windows
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
